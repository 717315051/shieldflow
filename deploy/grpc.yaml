# ============================================================================
# ShieldFlow gRPC Server 配置模板 (grpc.yaml)
# 组件: cmd/grpc-server  →  Supervisor: shieldflow-master:shieldflow-grpc-server
# 部署路径: /etc/shieldflow/grpc.yaml
# ============================================================================
server:
  host: 0.0.0.0
  port: 50051
  mode: production

grpc:
  port: 50051
  tls: false
  cert: /etc/shieldflow/certs/server.crt
  key: /etc/shieldflow/certs/server.key

database:
  driver: postgres
  host: 127.0.0.1
  port: 5432
  name: shieldflow_cdn
  user: shieldflow
  password: "CHANGE_ME_STRONG_PASSWORD"
  max_open_conns: 50
  max_idle_conns: 5

clickhouse:
  host: 127.0.0.1
  port: 9000
  database: shieldflow_cdn
  username: default
  password: ""

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "CHANGE_ME_TO_RANDOM_64_CHAR_STRING"
  expire: 24h

log:
  level: info
  format: json
  output: /var/log/shieldflow/grpc-server.log
