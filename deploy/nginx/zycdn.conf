# ============================================================================
# ShieldFlow 管理后台 Nginx 反向代理配置模板
# 部署路径: /etc/nginx/conf.d/shieldflow.conf
# 功能:
#   - 静态前端资源 (/usr/local/shieldflow/web)
#   - 反向代理 /api → 后端 :8080
#   - WebSocket 支持 (未来实时日志)
#   - 安全头 + gzip
# ============================================================================

# 后端上游
upstream shieldflow_backend {
    server 127.0.0.1:8080 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name _;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name _;

    # === TLS 证书（按需替换） ===
    ssl_certificate     /etc/shieldflow/certs/shieldflow.crt;
    ssl_certificate_key /etc/shieldflow/certs/shieldflow.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # === 安全头 ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # === gzip ===
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    # === 上传大小（证书导入等） ===
    client_max_body_size 50m;

    # === 静态前端 ===
    root /usr/local/shieldflow/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === API 反向代理 ===
    location /api/ {
        proxy_pass http://shieldflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # === WebSocket（实时日志推送，未来扩展） ===
    location /ws/ {
        proxy_pass http://shieldflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # 健康检查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
